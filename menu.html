<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Tiệm Bánh Chú Hoàng</title>
    <style>
        /* Tận dụng lại CSS từ index và thêm phần Menu đặc trưng */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #FAFCF7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .filter-buttons { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .btn-filter { background: white; border: 2px solid #DDE8CD; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn-filter.active { background: #8CB353; color: white; }
        .category-content { display: none; }
        .price-board { background: white; padding: 30px; border-radius: 15px; text-align: center; border-top: 5px solid #8CB353; margin-bottom: 40px; }
        .price-list { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; list-style: none; }
        .price-list li { background: #f9f9f9; padding: 15px; border-radius: 10px; min-width: 150px; }
        .price-list li span { display: block; font-size: 12px; color: #888; }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .gallery-item { position: relative; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
        .order-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .gallery-item:hover .order-overlay { opacity: 1; }
        /* Modal và các phần khác giữ nguyên phong cách cũ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-box { background: white; width: 90%; max-width: 800px; border-radius: 20px; display: flex; overflow: hidden; }
        .modal-img { flex: 1; height: 400px; object-fit: cover; }
        .modal-info { flex: 1; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; color:#2c3e50;">THỰC ĐƠN TIỆM BÁNH</h1>
        <div class="filter-buttons">
            <button class="btn-filter active" onclick="showCat('gato', this)">Bánh Gato</button>
            <button class="btn-filter" onclick="showCat('tiramisu', this)">Tiramisu</button>
            <button class="btn-filter" onclick="showCat('bonglan', this)">Bông Lan Trứng Muối</button>
            <button class="btn-filter" onclick="showCat('mousse', this)">Bánh Mousse</button>
            <button class="btn-filter" onclick="showCat('cheese', this)">Cheese Cake</button>
        </div>

        <div id="menu-container">
            </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-box">
            <img id="m-img" class="modal-img">
            <div class="modal-info">
                <h3 id="m-name">Tên Bánh</h3>
                <p id="m-cat" style="color:#8CB353; font-weight:bold; margin-bottom:15px;"></p>
                <select id="m-size" style="width:100%; padding:10px; margin-bottom:10px;"></select>
                <input type="text" id="m-user" placeholder="Họ tên" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="tel" id="m-phone" placeholder="Số điện thoại" style="width:100%; padding:10px; margin-bottom:10px;">
                <button onclick="sendZalo()" style="width:100%; padding:15px; background:#8CB353; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">XÁC NHẬN QUA ZALO</button>
                <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer; width:100%;">Quay lại</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNBDuWVzURafsXjXEBAksgFL5Jnz5xLPyBfnton8WxZKYKCepMdF8E_BTa7577RRY37Q/exec';
        let ALL_DATA = {};

        window.onload = function() {
            fetch(API_URL).then(r => r.json()).then(data => {
                ALL_DATA = data;
                renderMenu(data);
            });
        };

        function renderMenu(data) {
            const cats = {"Bánh Gato":"gato","Tiramisu":"tiramisu","Bông Lan Trứng Muối":"bonglan","Bánh Mousse":"mousse","Cheese Cake":"cheese"};
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            
            Object.keys(cats).forEach((name, idx) => {
                const id = cats[name];
                const priceRow = data.giaBanh.find(r => r[0] === name) || [name,0,0,0,0];
                const models = data.mauBanh.filter(m => m[1] === id);
                
                let html = `<div id="${id}" class="category-content" style="${idx===0?'display:block':''}">
                    <div class="price-board">
                        <h2>Bảng Giá ${name}</h2>
                        <ul class="price-list">
                            <li><span>Size S</span>${priceRow[1]}</li><li><span>Size M</span>${priceRow[2]}</li>
                            <li><span>Size L</span>${priceRow[3]}</li><li><span>Size XL</span>${priceRow[4]}</li>
                        </ul>
                    </div>
                    <div class="image-gallery">`;
                
                models.forEach(m => {
                    html += `<div class="gallery-item" onclick="openOrder('${id}','${m[0]}','${m[2]}')">
                        <img src="${m[2]}"><div class="order-overlay"><button style="padding:10px 20px; border-radius:20px; border:none; font-weight:bold; color:#8CB353;">Đặt bánh</button></div>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function showCat(id, btn) {
            document.querySelectorAll('.category-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            btn.classList.add('active');
        }

        function openOrder(catId, name, img) {
            const cats = {"gato":"Bánh Gato","tiramisu":"Tiramisu","bonglan":"Bông Lan Trứng Muối","mousse":"Bánh Mousse","cheese":"Cheese Cake"};
            document.getElementById('m-img').src = img;
            document.getElementById('m-name').innerText = name;
            document.getElementById('m-cat').innerText = cats[catId];
            const priceRow = ALL_DATA.giaBanh.find(r => r[0] === cats[catId]);
            const select = document.getElementById('m-size');
            select.innerHTML = `<option>Size S - ${priceRow[1]}</option><option>Size M - ${priceRow[2]}</option><option>Size L - ${priceRow[3]}</option><option>Size XL - ${priceRow[4]}</option>`;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() { document.getElementById('orderModal').classList.remove('active'); }

        function sendZalo() {
            const msg = `🎂 ĐƠN HÀNG: ${document.getElementById('m-name').innerText}\n- Size: ${document.getElementById('m-size').value}\n- Khách: ${document.getElementById('m-user').value}\n- SĐT: ${document.getElementById('m-phone').value}\n- Ảnh: ${document.getElementById('m-img').src}`;
            navigator.clipboard.writeText(msg).then(() => {
                alert("Đã copy đơn! Đang mở Zalo...");
                window.open("https://zalo.me/84767895010", "_blank");
            });
        }
    </script>
</body>
</html>
